<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Flask实验平台{% endblock %}</title>
    <!-- 引入静态CSS文件 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <!-- 公共导航栏 -->
  <div class="nav">
      <a href="/">首页</a>
      <a href="/list">列表页</a>
      <a href="/about">关于页</a>
  </div>
  <hr>

  <!-- 子模板个性化内容块 -->
  <div class="content">
      {% block content %}{% endblock %}
  </div>
  <hr>

  <!-- 公共页脚 -->
  <div class="footer">
      <p>© 2024 Flask教学实验平台</p>
  </div>
</body>
</html>
